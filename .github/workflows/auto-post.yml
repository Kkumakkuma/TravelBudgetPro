name: Auto Generate Blog Post

on:
  schedule:
    # Run every 4 hours offset by 15 min: 01:15, 05:15, 09:15, 13:15, 17:15, 21:15 UTC
    - cron: '15 1/4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Random delay (0-3600s) — avoid posting on the dot
        run: |
          DELAY=$((RANDOM % 3600))
          echo "Sleeping ${DELAY}s before generation"
          sleep $DELAY

      - name: Install dependencies
        run: pip install openai Pillow

      - name: Generate new post (with retry on transient failures)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python scripts/generate_post.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit new post
        run: |
          git config user.name "TravelBudgetPro Bot"
          git config user.email "bot@travelbudgetpro.com"
          git add _posts/ scripts/used_topics.json scripts/used_promo_titles.json assets/pin-images/
          git diff --staged --quiet || git commit -m "Auto-publish new article $(date +%Y-%m-%d-%H%M)"
          git push

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-post
    steps:
      - name: Checkout for IndexNow
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: IndexNow ping (Bing/Yandex/Naver)
        if: success()
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import json, os, subprocess, urllib.request, re
          repo = os.environ.get("GITHUB_REPOSITORY","").split("/")[-1]
          if not repo:
              raise SystemExit(0)
          since_iso = subprocess.check_output(
              ["bash","-c","date -u -d '1 hour ago' +'%Y-%m-%dT%H:%M:%SZ'"]
          ).decode().strip()
          out = subprocess.check_output(
              ["git","log","--since",since_iso,"--name-only","--pretty=format:","--diff-filter=A"]
          ).decode()
          urls = []
          for line in out.split("\n"):
              m = re.match(r"_posts/(\d{4})-(\d{2})-(\d{2})-(.+)\.md$", line.strip())
              if m:
                  yyyy, mm, dd, slug = m.groups()
                  urls.append(f"https://kkumakkuma.github.io/{repo}/{yyyy}/{mm}/{dd}/{slug}/")
          if not urls:
              print("IndexNow: no new URLs in last hour")
              raise SystemExit(0)
          payload = {
              "host": "kkumakkuma.github.io",
              "key": "3edb9ac60100921ec4665d794fb30755",
              "keyLocation": "https://kkumakkuma.github.io/3edb9ac60100921ec4665d794fb30755.txt",
              "urlList": urls,
          }
          req = urllib.request.Request(
              "https://api.indexnow.org/IndexNow",
              data=json.dumps(payload).encode(),
              headers={"Content-Type":"application/json"},
              method="POST",
          )
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              print(f"IndexNow OK: {resp.status} ({len(urls)} URLs)")
          except Exception as e:
              print(f"IndexNow fail (non-fatal): {e}")
          PY

