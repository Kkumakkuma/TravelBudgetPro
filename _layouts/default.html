<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% seo %}
  {% feed_meta %}
  <meta name="google-adsense-account" content="ca-pub-5723595008598292">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.75; color: #222; background: #fdfdfd; }
    .container { max-width: 820px; margin: 0 auto; padding: 0 20px; }
    header { background: #1a365d; color: white; padding: 20px 0; }
    header .top-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; }
    header h1 { font-size: 1.6em; }
    header h1 a { color: white; text-decoration: none; }
    header p.tag { color: #a0c4ff; font-size: 0.9em; width: 100%; margin-top: 4px; }
    nav.main-nav { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 16px; }
    nav.main-nav a { color: #cfe0ff; text-decoration: none; font-size: 0.92em; padding: 4px 0; border-bottom: 2px solid transparent; }
    nav.main-nav a:hover { border-bottom-color: #cfe0ff; }
    main { padding: 40px 0 60px; min-height: 60vh; }
    footer { background: #1a365d; color: #cfe0ff; padding: 28px 0; text-align: center; font-size: 0.85em; }
    footer nav { margin-top: 10px; }
    footer nav a { color: #cfe0ff; margin: 0 10px; text-decoration: none; }
    footer nav a:hover { text-decoration: underline; }
    a { color: #2563eb; }
    h1, h2, h3 { color: #1a365d; margin: 22px 0 12px; line-height: 1.3; }
    h1 { font-size: 2em; }
    h2 { font-size: 1.45em; margin-top: 34px; }
    h3 { font-size: 1.15em; }
    p { margin-bottom: 14px; }
    ul, ol { margin: 14px 0 14px 28px; }
    li { margin-bottom: 6px; }
    img { max-width: 100%; height: auto; border-radius: 6px; margin: 14px 0; }
    blockquote { border-left: 4px solid #2563eb; padding: 8px 16px; color: #444; background: #f5f8ff; margin: 16px 0; }
    code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.93em; }
    table { border-collapse: collapse; width: 100%; margin: 18px 0; font-size: 0.95em; }
    th, td { border: 1px solid #d0d7e2; padding: 10px 12px; text-align: left; }
    th { background: #f1f5f9; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #e2e8f0; }
    .post-list h2 { margin: 0; font-size: 1.3em; }
    .post-list .post-meta { color: #667085; font-size: 0.85em; margin: 5px 0 10px; }
    .post-meta { color: #667085; font-size: 0.9em; margin-bottom: 18px; }
    .author-box { background: #f5f8ff; border: 1px solid #dce5f3; border-radius: 10px; padding: 20px; margin: 40px 0 20px; display: flex; gap: 16px; align-items: flex-start; }
    .author-box .avatar { width: 56px; height: 56px; border-radius: 50%; background: #1a365d; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4em; flex-shrink: 0; }
    .author-box h4 { margin: 0 0 4px; color: #1a365d; font-size: 1.05em; }
    .author-box p { margin: 0; font-size: 0.92em; color: #444; line-height: 1.6; }
    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin: 24px 0 40px; }
    .category-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 18px; transition: box-shadow 0.2s; }
    .category-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
    .category-card h3 { margin: 0 0 6px; font-size: 1.05em; }
    .category-card p { margin: 0; font-size: 0.85em; color: #555; }
    .hero { background: linear-gradient(135deg, #1a365d 0%, #2563eb 100%); color: white; padding: 40px 28px; border-radius: 14px; margin-bottom: 36px; }
    .hero h1 { color: white; margin: 0 0 10px; font-size: 1.8em; }
    .hero p { color: #dce5ff; margin: 0; font-size: 1.02em; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.3em; }
      .hero { padding: 28px 20px; }
      .hero h1 { font-size: 1.4em; }
    }
  </style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5L40K3SBQT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5L40K3SBQT');
  </script>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5723595008598292" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <div class="container">
      <div class="top-row">
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <p class="tag">{{ site.description }}</p>
      </div>
      <nav class="main-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
        <a href="{{ '/privacy-policy/' | relative_url }}">Privacy</a>
        <a href="{{ '/disclaimer/' | relative_url }}">Disclaimer</a>
        <a href="{{ '/terms/' | relative_url }}">Terms</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>
  <footer>
    <div class="container">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. Written by Kkuma Park. All rights reserved.</p>
      <nav>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
        <a href="{{ '/privacy-policy/' | relative_url }}">Privacy Policy</a>
        <a href="{{ '/terms/' | relative_url }}">Terms</a>
        <a href="{{ '/disclaimer/' | relative_url }}">Disclaimer</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        <a href="{{ '/sitemap.xml' | relative_url }}">Sitemap</a>
      </nav>
    </div>
  </footer>
  <script async defer src="https://assets.pinterest.com/js/pinit.js"></script>
</body>
</html>
